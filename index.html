<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=brightness_6">
</head>
<body class="font-sans bg-[#FCFCFC]">
    <header class="flex p-5 px-15 border-b-3 justify-between h-17 items-center bg-[#FFFF85]">
        <h1 class="text-[25px] font-medium">Notes Web Application</h1>
        <div class="flex font-medium gap-4">
            <button id="addNotesBtn" class="max-h-11 border-2 bg-white rounded-lg p-2 cursor-pointer" 
            >✚ Add Note
            </button>
            <button class="material-symbols-outlined bg-white rounded-lg p-2 cursor-pointer border-2"
            id="themeToggleBtn"
            >brightness_6
            </button>
        </div>
    </header>
    
    <main id="output" class="grid grid-cols-5 px-24 py-14 text-center gap-x-16 gap-y-18">
    </main>

    <dialog class="bg-white w-110 h-125 m-auto p-6 border-2 rounded-xl shadow-xl" id="noteDialog">
        <form id="noteForm" class="flex flex-col">
            <div id="dialogHeader">
                <h2 id="dialogTitle" class="text-[28px] font-medium text-center">Add New Note</h2>
                <hr class="border-1 my-2">
            </div>

            <div class="flex flex-col gap-1 my-2">
                <label for="noteTitle" class="text-[24px]">Title</label>
                <input type="text" id="noteTitle" class="w-97 h-10 border-2 text-[18] p-2 rounded-xl" 
                placeholder="Enter note title..." required>
            </div>

            <div class="flex flex-col gap-1 my-2">
                <label for="noteContent" class="text-[18px]">Content</label>
                <textarea id="noteContent" class="resize-none border-2 text-[18] p-2 rounded-xl h-45 mb-4" 
                placeholder="Write your note here..."></textarea>
            </div>

            <div class="flex text-center gap-4">
                <button type="button" class="border-2 p-2 rounded-sm bg-rose-400 font-medium text-red-800" onclick="closeNoteDialog()">Cancel</button>
                <button id="submitBtn" type="submit" class="border-2 p-2 rounded-sm bg-emerald-300 font-medium text-green-800 ">Save Note</button>
            </div>
        </form>
    </dialog>
    <script src="index.js"></script>
</body>
</html>
